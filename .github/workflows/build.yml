name: .NET Build

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "*"
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restore dependencies
        shell: pwsh
        run: dotnet restore .\xivclone.sln

      - name: Download Dalamud
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev"

      - name: Build
        shell: pwsh
        run: dotnet build .\xivclone.sln --no-restore --configuration Release --nologo

      - name: Archive
        shell: pwsh
        run: Compress-Archive -Path .\xivclone\bin\x64\Release\* -DestinationPath .\xivclone.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: xivclone-release
          path: .\xivclone\bin\x64\Release\*
