name: Create Test Release

on:
  push:
    tags:
      - "testing_*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restore dependencies
        shell: pwsh
        run: dotnet restore .\xivclone.sln

      - name: Download Dalamud
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev"

      - name: Build
        shell: pwsh
        run: |
          $ver = '${{ github.ref_name }}' -replace 'testing_'
          dotnet build .\xivclone.sln --no-restore --configuration Debug --nologo "-p:Version=$ver" "-p:FileVersion=$ver" "-p:AssemblyVersion=$ver"

      - name: Write version into plugin manifest
        shell: pwsh
        run: |
          $ver = '${{ github.ref_name }}' -replace 'testing_'
          $path = '.\xivclone\bin\x64\Debug\xivclone.json'
          $json = Get-Content -Raw $path | ConvertFrom-Json
          $json.AssemblyVersion = $ver
          $content = $json | ConvertTo-Json
          Set-Content -Path $path -Value $content

      - name: Archive
        shell: pwsh
        run: Compress-Archive -Path .\xivclone\bin\x64\Debug\* -DestinationPath .\xivclone.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: xivclone-debug
          path: .\xivclone\bin\x64\Debug\*

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: .\xivclone.zip
          name: xivclone ${{ github.ref_name }}
          draft: false
          prerelease: false

      - name: Write out repo.json
        shell: pwsh
        run: |
          $verTag = '${{ github.ref_name }}'
          $ver = $verTag -replace 'testing_'
          $path = '.\repo.json'
          $json = Get-Content -Raw $path | ConvertFrom-Json
          $json[0].TestingAssemblyVersion = $ver
          $json[0].DownloadLinkTesting = $json[0].DownloadLinkTesting -replace '[^/]+/xivclone.zip',"$verTag/xivclone.zip"
          $content = $json | ConvertTo-Json -AsArray
          Set-Content -Path $path -Value $content

      - name: Commit repo.json
        shell: pwsh
        run: |
          git config --global user.name "Actions User"
          git config --global user.email "actions@github.com"
          git fetch origin "$env:DEFAULT_BRANCH"
          git checkout "$env:DEFAULT_BRANCH"
          git pull --ff-only origin "$env:DEFAULT_BRANCH"
          git add repo.json
          git commit -m "[CI] Updating repo.json for ${{ github.ref_name }}" || exit 0
          git push origin "$env:DEFAULT_BRANCH"
